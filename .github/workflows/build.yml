name: build rule-set

on:
  push:
    branches: [main]
    paths:
      - "source/**"
      - ".github/workflows/build.yml"
  schedule:
    # weekly, keeps the mirrored upstream sets fresh
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-rule-set
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          set -euo pipefail
          tag="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)"
          ver="${tag#v}"
          echo "sing-box ${ver}"
          curl -fsSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/${tag}/sing-box-${ver}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo install -m755 "sing-box-${ver}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version

      - name: Compile rule sets
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          echo "OUT=$out" >> "$GITHUB_ENV"
          for f in source/*.json; do
            name="$(basename "$f" .json)"
            sing-box rule-set compile --output "$out/$name.srs" "$f"
            cp "$f" "$out/$name.json"
            echo "compiled $name"
          done

      - name: Build aggregates
        run: |
          set -euo pipefail
          # aggregates/<name>.txt lists member rule-set names; their source
          # rules are merged (OR'd) into a single <name> set so configs can
          # reference one tag instead of dozens.
          for m in aggregates/*.txt; do
            name="$(basename "$m" .txt)"
            mapfile -t members < <(grep -vE '^\s*(#|$)' "$m")
            files=(); for x in "${members[@]}"; do files+=("source/$x.json"); done
            jq -s '{version: 1, rules: (map(.rules) | add)}' "${files[@]}" \
              > "$OUT/$name.json"
            sing-box rule-set compile --output "$OUT/$name.srs" "$OUT/$name.json"
            echo "aggregated $name from ${#members[@]} sets"
          done

      - name: Mirror upstream rule sets
        run: |
          set -euo pipefail
          # Too large to hand-maintain; mirrored from SagerNet so configs
          # only ever reference this repo. Data is unchanged upstream data.
          curl -fsSL -o "$OUT/geoip-cn.srs" \
            "https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-cn.srs"
          curl -fsSL -o "$OUT/geosite-geolocation-!cn.srs" \
            "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-geolocation-!cn.srs"
          # sanity-check they are valid rule-set binaries
          sing-box rule-set decompile --output /dev/null "$OUT/geoip-cn.srs"
          sing-box rule-set decompile --output /dev/null "$OUT/geosite-geolocation-!cn.srs"
          echo "mirrored geoip-cn ($(stat -c%s "$OUT/geoip-cn.srs")B), geosite-geolocation-!cn ($(stat -c%s "$OUT/geosite-geolocation-!cn.srs")B)"

      - name: Publish to rule-set branch
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch --orphan rule-set
          find . -maxdepth 1 -mindepth 1 -not -name .git -exec rm -rf {} +
          cp "$OUT"/* .
          {
            echo "# rule-set (generated)"
            echo
            echo "Built from \`source/\` on \`main\` by CI. Do not edit by hand."
            echo
            echo "_$(date -u +%Y-%m-%dT%H:%M:%SZ)_"
          } > README.md
          git add -A
          git commit -m "build: rule-set from ${GITHUB_SHA::7}"
          git push -f origin rule-set
